<!DOCTYPE html>
<html>
<head>
  <title>Pizza AR Menu</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #111; }
    model-viewer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <model-viewer
    src="https://raw.githubusercontent.com/9173393556/pizza-ar/main/pizza%20(3).glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    alt="Pizza 3D Model"
    loading="eager">
  </model-viewer>
</body>
</html>
